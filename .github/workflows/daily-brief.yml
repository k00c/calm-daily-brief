name: Daily Calm Brief — Content

on:
  schedule:
    # 4pm UTC = midnight AWST (UTC+8) — hours of slack before the audio job
    # and before the reader wakes, so scheduler delay here is harmless.
    - cron: "47 16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          READER_CONTEXT: ${{ secrets.READER_CONTEXT }}
        run: python scripts/generate.py --mode content

      - name: Commit and push
        run: |
          git config user.name "calm-daily-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          paths=()
          for p in index.html stories archive data; do
            [ -e "$p" ] && paths+=("$p")
          done
          if [ ${#paths[@]} -eq 0 ]; then
            echo "Nothing to commit."
            exit 0
          fi
          git add -A "${paths[@]}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily content update — $(date -u +'%Y-%m-%d')"
            git push
          fi
