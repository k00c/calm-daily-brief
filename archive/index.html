<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Calm Brief">
<link rel="apple-touch-icon" href="/calm-daily-brief/apple-touch-icon.png">
<title>Archive — Calm Daily Brief</title>
<style>
  :root {
    --bg: #f6f4ef;
    --card-bg: #fffefc;
    --longform-bg: #f0ebe1;
    --text: #2c2a26;
    --muted: #8a8377;
    --muted-2: #aba493;
    --accent: #7d7256;
    --accent-soft: #ece6d8;
    --border: #e6e1d4;
    --shadow: 0 1px 2px rgba(40, 35, 20, 0.04), 0 4px 14px rgba(40, 35, 20, 0.05);
    --shadow-hover: 0 2px 4px rgba(40, 35, 20, 0.05), 0 10px 24px rgba(40, 35, 20, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 0%, rgba(125, 114, 86, 0.05), transparent 55%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  header {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 24px 28px;
  }
  header .kicker {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 10px;
  }
  header h1 {
    font-size: 1.7rem;
    font-weight: 650;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    color: var(--text);
  }
  header p.meta {
    margin: 0;
    color: var(--muted);
    font-size: 0.92rem;
  }
  header .rule {
    margin-top: 26px;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent 85%);
  }
  .banner {
    display: block;
    width: 100%;
    height: auto;
    max-height: 130px;
    border-radius: 14px;
    margin-bottom: 22px;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 8px 24px 72px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media (min-width: 720px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 20px; }
  }
  .card {
    display: flex;
    flex-direction: column;
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    color: var(--text);
    transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
  }
  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
    border-color: var(--muted-2);
  }
  .card.longform {
    background: var(--longform-bg);
    border-left: 3px solid var(--accent);
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .topic {
    font-size: 0.72rem;
    font-weight: 650;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .longread-badge {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--accent);
    background: rgba(125, 114, 86, 0.1);
    border-radius: 999px;
    padding: 3px 10px;
  }
  .headline {
    font-weight: 600;
    margin: 0 0 8px;
    font-size: 1.04rem;
    letter-spacing: -0.005em;
  }
  .summary {
    margin: 0 0 16px;
    font-size: 0.96rem;
    color: var(--text);
    flex-grow: 1;
  }
  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .tag {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 999px;
    padding: 3px 10px;
  }

  .archive-note {
    margin-top: 36px;
    text-align: center;
    font-size: 0.82rem;
  }
  .archive-note a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent);
  }
  .story-page main {
    max-width: 620px;
    padding-top: 16px;
  }
  .story-page .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 32px;
    color: var(--muted);
    text-decoration: none;
    font-size: 0.86rem;
    transition: color 0.15s ease;
  }
  .story-page .back-link:hover {
    color: var(--accent);
  }
  .story-page .topic {
    display: block;
    margin-bottom: 14px;
  }
  .story-page .body-text {
    background: var(--card-bg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    border-radius: 12px;
    padding: 28px;
  }
  .story-page .body-text p {
    margin: 0 0 14px;
    font-size: 1.04rem;
  }
  .story-page .body-text p:last-child {
    margin-bottom: 0;
  }
  .story-page .story-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .story-page .original-link {
    display: inline-block;
    margin-top: 22px;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    background: var(--accent-soft);
    border-radius: 8px;
    padding: 11px 18px;
    transition: background 0.15s ease;
  }
  .story-page .original-link:hover {
    background: #e2dac5;
  }
  .footer-note {
    margin-top: 48px;
    text-align: center;
    color: var(--muted-2);
    font-size: 0.78rem;
  }
</style>
</head>

</body>
</html>
